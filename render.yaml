services:
  - type: web
    name: investment-research-coach-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: USE_LLM_AGENTS
        value: "true"
      - key: LLM_TIMEOUT_SECONDS
        value: "60"
      - key: CORS_ALLOWED_ORIGIN_REGEX
        sync: false
      - key: MAX_UPLOAD_BYTES
        value: "26214400"
      - key: MAX_FILES_PER_REQUEST
        value: "20"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: MAX_LLM_CALLS_PER_WORKFLOW
        value: "20"
