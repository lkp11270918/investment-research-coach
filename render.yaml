services:
  - type: web
    name: investment-research-coach-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: USE_LLM_AGENTS
        value: "true"
      - key: LLM_TIMEOUT_SECONDS
        value: "60"
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
